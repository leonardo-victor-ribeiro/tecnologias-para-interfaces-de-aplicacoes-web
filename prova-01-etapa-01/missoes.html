<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prova 1 - Etapa 1</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/missoes_espaciais_internacionais.js"></script>
    <!--Biblioteca para paginacao de tabela-->
    <link
      href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.css"
      rel="stylesheet"
    />
    <script
      defer
      src="https://cdn.datatables.net/2.1.8/js/dataTables.js"
    ></script>
  </head>
  <body>
    <div class="container-fluid">
      <!-- navbar -->
      <nav class="navbar navbar-expand-lg bg-body-tertiary mb-5">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="./img/IFTM.svg" alt="IFTM" width="30" height="24" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavAltMarkup"
            aria-controls="navbarNavAltMarkup"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
              <a class="nav-link active" aria-current="page" href="index.html"
                >Home</a
              >
              <a class="nav-link" href="missoes.html">Missões Espaciais</a>
            </div>
          </div>
        </div>
      </nav>

      <!-- home -->
      <div class="text-center mb-5">
        <h1>Missões Espaciais de 1957 a 2026</h1>
      </div>

      <div class="container mb-5">
        <!-- form -->
        <div class="card p-3">
          <div class="text-center">
            <h4>Formulario de Filtro</h4>
          </div>
          <form>
            <div class="row g-3">
              <div class="col-sm-3">
                <label for="inputAno" class="form-label"
                  >Ano de Lançamento</label
                >
                <select class="form-select" aria-label="Default select example">
                  <option selected>Todos</option>
                  <option value="1">One</option>
                  <option value="2">Two</option>
                  <option value="3">Three</option>
                </select>
              </div>
              <div class="col-sm-3">
                <label for="inputAno" class="form-label">País de Origem</label>
                <select class="form-select" aria-label="Default select example">
                  <option selected>Todos</option>
                  <option value="1">One</option>
                  <option value="2">Two</option>
                  <option value="3">Three</option>
                </select>
              </div>
              <div class="col-sm-3">
                <label for="inputAno" class="form-label">Status</label>
                <select class="form-select" aria-label="Default select example">
                  <option selected>Todos</option>
                  <option value="1">One</option>
                  <option value="2">Two</option>
                  <option value="3">Three</option>
                </select>
              </div>
              <div class="col-sm-3">
                <label for="inputAno" class="form-label">Tripulada?</label>
                <select class="form-select" aria-label="Default select example">
                  <option selected>Todos</option>
                  <option value="1">One</option>
                  <option value="2">Two</option>
                  <option value="3">Three</option>
                </select>
              </div>
            </div>

            <div class="row gap-3">
              <div class="col-sm-5">
                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label"
                    >Nome da Missão</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="exampleInputEmail1"
                    aria-describedby="emailHelp"
                  />
                </div>
              </div>
              <div class="col-sm-5">
                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label"
                    >Objetivo da Missão</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="exampleInputEmail1"
                    aria-describedby="emailHelp"
                  />
                </div>
              </div>
            </div>
            <div class="row gap-3">
              <div class="col-sm-12">
                <button type="button" class="btn btn-primary">Pesquisar</button>
                <button type="button" class="btn btn-secondary">Limpar</button>
              </div>
            </div>
          </form>
        </div>
        <!-- table -->
        <table class="table table-striped" id="tabMissoes">
          <thead>
            <tr>
              <th scope="col">Nome da Missão</th>
              <th scope="col">Ano de Lançamento</th>
              <th scope="col">Objetivo</th>
              <th scope="col">Status</th>
              <th scope="col">Destino</th>
              <th scope="col">Tripulada</th>
              <th scope="col">País</th>
            </tr>
          </thead>
          <tbody id="divMissoes"></tbody>
        </table>
      </div>

      <!-- footer -->
      <footer class="bg-light">
        <img
          src="./img/IFTM.png"
          class="rounded mx-auto d-block"
          height="60"
          alt="..."
        />
      </footer>
    </div>
    <script defer src="js/main.js"></script>
  </body>
</html>
