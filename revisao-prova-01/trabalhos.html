<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <div class="container-fluid d-flex flex-column align-content-between">

        <!-- navbar -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">

                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="trabalhos.html">Trabalhos SIN</a>

                </div>

        <main class="d-flex flex-column align-items-center">

            <!-- form -->
             <form>
                <div class="row gx-3">
                    <div class="col gy-3">
                        <label for="numero" class="form-label">Nro</label>
                        <input type="text" class="form-control" id="numero">
                    </div>
                    <div class="col gy-3">
                        <label for="sessao" class="form-label">Sessão</label>
                        <input type="text" class="form-control" id="sessao">
                    </div>
                    <div class="col gy-3">
                        <label for="data" class="form-label">Data</label>
                        <input type="date" class="form-control" id="data">
                    </div>
                </div>
                <div class="row gx-3">
                    <div class="col gy-3">
                        <label for="estudante" class="form-label">Estudante</label>
                        <input type="text" class="form-control" id="estudante">
                    </div>
    
                    <div class="col gy-3">
                        <label for="orientador" class="form-label">Orientador</label>
                        <input type="text" class="form-control" id="orientador">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Pesquisar</button>
            </form>

            <!-- table -->
            <h1 class="fw-bold">Trabalhos do SIN</h1>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th scope="col">Nro</th>
                        <th scope="col">Sessão</th>
                        <th scope="col">Área</th>
                        <th scope="col">Título</th>
                        <th scope="col">Aluno</th>
                        <th scope="col">Orientador</th>
                        <th scope="col">Campus</th>
                        <th scope="col">Toten</th>
                        <th scope="col">Dia</th>
                        <th scope="col">Início</th>
                        <th scope="col">Término</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Mark</td>
                        <td>Otto</td>
                        <td>@mdo</td>
                        <td>Jacob</td>
                        <td>Thornton</td>
                        <td>@fat</td>
                        <td>Mark</td>
                        <td>Otto</td>
                        <td>@mdo</td>
                        <td>Jacob</td>
                        <td>Thornton</td>
                    </tr>

        <footer class="d-flex flex-row justify-content-center">
            <img src="assets/IFTM.png" alt="XIV Seminário de Iniciação Científica" width="250">
