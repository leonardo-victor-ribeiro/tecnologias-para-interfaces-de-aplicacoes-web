<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminário de Iniciação Científica - Trabalhos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>

</head>

<body>

    <div class="container-fluid d-flex flex-column align-content-between">

        <!-- navbar -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="assets/conpitec.png" alt="Logo" width="225" height="60"
                        class="d-inline-block align-text-top">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="trabalhos.html">Trabalhos SIN</a>
                        </li>
                        <li class="nav-item">
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container d-flex flex-column align-items-center py-5">
            <h1 class="fw-bold">Trabalhos do SIN</h1>

            <!-- form -->
            <form class="container mb-5" id="tbForm">
                <div class="row gx-3">
                    <div class="col gy-3">
                        <label for="numero" class="form-label">Nro</label>
                        <input type="text" class="form-control" id="numero">
                    </div>
                    <div class="col gy-3">
                        <label for="sessao" class="form-label">Sessão</label>
                        <select class="form-select" id="sessao">
                            <option value="" selected>Todas as sessões</option>
                        </select>
                    </div>
                    <div class="col gy-3">
                        <label for="toten" class="form-label">Toten</label>
                        <select class="form-select" id="toten">
                            <option value="" selected>Todos os totens</option>
                        </select>
                    </div>
                    <div class="col gy-3">
                        <label for="data" class="form-label">Data</label>
                        <select class="form-select" id="data">
                            <option value="" selected>Todas as datas</option>
                        </select>
                    </div>
                </div>
                <div class="row gx-3">
                    <div class="col gy-3">
                        <label for="estudante" class="form-label">Estudante</label>
                        <input type="text" class="form-control" id="estudante">
                    </div>

                    <div class="col gy-3">
                        <label for="orientador" class="form-label">Orientador</label>
                        <input type="text" class="form-control" id="orientador">
                    </div>
                </div>
                <div class="d-grid gap-5 d-md-block mt-3">
                    <button type="reset" class="btn btn-warning">Limpar</button>
                    <button type="submit" class="btn btn-primary">Pesquisar</button>
                </div>
            </form>

            <!-- table -->
            <div id="tabelaTrabalhos"></div>
        </main>

        <footer class="d-flex flex-row justify-content-center">
            <img src="assets/IFTM.png" alt="XIV Seminário de Iniciação Científica" width="250">
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>

    <!--Opcional na prova-->
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.js"></script>
    <!--Fim opcional-->

    <script src="./data/trabalhosSIN.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
